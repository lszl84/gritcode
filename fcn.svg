<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="48" fill="#1a1b2e"/>
  <rect x="8" y="8" width="240" height="240" rx="40" fill="#252640"/>
  <!-- Lightning bolt -->
  <polygon points="148,32 88,140 124,140 108,224 168,116 132,116" fill="#6ecf6e"/>
  <!-- Subtle glow -->
  <polygon points="148,32 88,140 124,140 108,224 168,116 132,116" fill="#6ecf6e" opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
