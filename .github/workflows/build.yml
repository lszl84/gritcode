name: build

on:
  push:
    branches: [wx]
    tags: ['v*']
  pull_request:
    branches: [wx]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang ninja-build cmake \
            libwxgtk3.2-dev libgtk-3-dev \
            libcurl4-openssl-dev libsqlite3-dev \
            libsecret-1-dev \
            dpkg-dev file

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            build/wx_gritcode-*.deb
            build/wx_gritcode-*.tar.gz

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          version=$(grep -oP 'project\(wx_gritcode VERSION \K[0-9a-z.-]+' CMakeLists.txt)
          cmake --install build --prefix AppDir/usr
          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          OUTPUT="wx_gritcode-${version}-x86_64.AppImage" \
            ./linuxdeploy-x86_64.AppImage \
              --appdir AppDir \
              --plugin gtk \
              --desktop-file AppDir/usr/share/applications/wx_gritcode.desktop \
              --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/wx_gritcode.svg \
              --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: wx_gritcode-*.AppImage

  release:
    name: Publish GitHub Release
    needs: [linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: true
