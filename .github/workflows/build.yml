name: build

on:
  push:
    branches: [wx]
    tags: ['v*']
  pull_request:
    branches: [wx]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang ninja-build cmake \
            libwxgtk3.2-dev libgtk-3-dev \
            libcurl4-openssl-dev libsqlite3-dev \
            libsecret-1-dev \
            dpkg-dev file

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            build/wx_gritcode-*.deb
            build/wx_gritcode-*.tar.gz

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          version=$(grep -oP 'project\(wx_gritcode VERSION \K[0-9a-z.-]+' CMakeLists.txt)
          cmake --install build --prefix AppDir/usr
          # linuxdeploy needs a PNG for .DirIcon (can't rasterize SVGs).
          # The PNG is pre-rendered and stored in the repo.
          cp packaging/wx_gritcode.png AppDir/wx_gritcode.png
          cp packaging/wx_gritcode.png AppDir/.DirIcon
          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          # The official plugin hardcodes GDK_BACKEND=x11. Patch to prefer
          # Wayland with X11 fallback.
          sed -i 's/GDK_BACKEND=x11/GDK_BACKEND=wayland,x11/' linuxdeploy-plugin-gtk.sh
          # Disable GTK client-side decorations so GNOME/mutter provides
          # native window decorations (SSD) on Wayland.
          sed -i '/GTK_THEME=/a export GTK_CSD=0' linuxdeploy-plugin-gtk.sh
          OUTPUT="wx_gritcode-${version}-x86_64.AppImage" \
            ./linuxdeploy-x86_64.AppImage \
              --appdir AppDir \
              --plugin gtk \
              --desktop-file AppDir/usr/share/applications/wx_gritcode.desktop \
              --icon-file AppDir/wx_gritcode.png \
              --output appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: wx_gritcode-*.AppImage

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: brew install wxwidgets

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Bundle dylibs into .app
        run: |
          app="build/wx_gritcode.app"
          bin="$app/Contents/MacOS/wx_gritcode"
          fwdir="$app/Contents/Frameworks"
          mkdir -p "$fwdir"

          # Recursively resolve and copy all non-system dylibs.
          resolve() {
            for dep in $(otool -L "$1" | grep -E '/opt/homebrew|/usr/local' | awk '{print $1}'); do
              name=$(basename "$dep")
              dest="$fwdir/$name"
              if [ ! -f "$dest" ]; then
                cp "$dep" "$dest"
                chmod 755 "$dest"
                resolve "$dest"
              fi
              install_name_tool -change "$dep" "@executable_path/../Frameworks/$name" "$1"
              install_name_tool -id "@executable_path/../Frameworks/$name" "$dest" 2>/dev/null || true
            done
          }
          resolve "$bin"

          # Ad-hoc sign inner-to-outer.
          for dylib in "$fwdir"/*.dylib; do
            codesign --force --sign - "$dylib"
          done
          codesign --force --sign - "$bin"
          codesign --force --sign - "$app"

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: build/wx_gritcode-*.dmg

  windows:
    name: Windows (mingw-clang)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6

      - name: Set up MSYS2 (CLANG64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-toolchain
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-wxwidgets3.3-msw
            mingw-w64-clang-x86_64-nsis

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: build/wx_gritcode-*.exe

  release:
    name: Publish GitHub Release
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete stale releases for this tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --prerelease \
            --generate-notes \
            --title "${{ github.ref_name }}"
