name: build

on:
  push:
    branches: [wx]
    tags: ['v*']
  pull_request:
    branches: [wx]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang ninja-build cmake \
            libwxgtk3.2-dev libgtk-3-dev \
            libcurl4-openssl-dev libsqlite3-dev \
            libsecret-1-dev \
            dpkg-dev file

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: build/wx_gritcode-*.deb

  macos:
    name: macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: brew install wxwidgets

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Bundle dylibs into .app
        run: |
          app="build/wx_gritcode.app"
          bin="$app/Contents/MacOS/wx_gritcode"
          fwdir="$app/Contents/Frameworks"
          mkdir -p "$fwdir"

          # Recursively resolve and copy all non-system dylibs.
          resolve() {
            for dep in $(otool -L "$1" | grep -E '/opt/homebrew|/usr/local' | awk '{print $1}'); do
              name=$(basename "$dep")
              dest="$fwdir/$name"
              if [ ! -f "$dest" ]; then
                cp "$dep" "$dest"
                chmod 755 "$dest"
                resolve "$dest"
              fi
              install_name_tool -change "$dep" "@executable_path/../Frameworks/$name" "$1"
              install_name_tool -id "@executable_path/../Frameworks/$name" "$dest" 2>/dev/null || true
            done
          }
          resolve "$bin"

          # Ad-hoc sign inner-to-outer.
          for dylib in "$fwdir"/*.dylib; do
            codesign --force --sign - "$dylib"
          done
          codesign --force --sign - "$bin"
          codesign --force --sign - "$app"

      - name: Package
        working-directory: build
        run: cpack

      - name: Upload .dmg
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: build/wx_gritcode-*.dmg

  snap:
    name: Snap
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Build snap
        uses: canonical/action-build@v1
        id: snapcraft

      - name: Upload .snap
        uses: actions/upload-artifact@v7
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}

  release:
    name: Publish GitHub Release
    needs: [linux, macos, snap]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete stale releases for this tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --prerelease \
            --generate-notes \
            --title "${{ github.ref_name }}"
