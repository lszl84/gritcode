name: gritcode
version: "0.1.6"
summary: "Native desktop AI coding assistant — no Electron, no browser tab"
description: |
  A fast, native desktop AI coding assistant built with C++20 and wxWidgets.
  Streaming markdown rendering, multi-session history with full-text search,
  and a one-click Play button that builds and runs your project without an
  AI roundtrip.

  Features:
  - Streaming markdown — paragraphs, headings, code blocks, tables
  - One-click Play button — builds and runs your project, no AI needed
  - Tool calls — bash, read/write/edit files, web fetch, directory listing
  - Multi-session history with SQLite persistence and cross-project search
  - Collapsible tool-call cards and thinking blocks
  - Native dark/light theme
  - ~10 MB binary, ~50 MB RAM at rest

  Supports DeepSeek V4 (API key) or the free OpenCode Zen tier.

license: GPL-3.0
base: core24
confinement: classic
grade: stable

apps:
  gritcode:
    command: bin/gritcode
    desktop: share/applications/gritcode.desktop

parts:
  gritcode:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_C_COMPILER=clang
      - -DCMAKE_CXX_COMPILER=clang++
      - -DCMAKE_INSTALL_PREFIX=/
    build-packages:
      - g++
      - ninja-build
      - pkg-config
      - libgtk-3-dev
      - libcurl4-openssl-dev
      - libsqlite3-dev
      - libsecret-1-dev
      - libwxgtk3.2-dev
    stage-packages:
      - libgtk-3-0t64
      - libcurl4t64
      - libsqlite3-0
      - libsecret-1-0
      - libwxgtk3.2-1t64
      - libwxbase3.2-1t64